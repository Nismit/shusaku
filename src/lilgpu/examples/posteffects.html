<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lilGPU — Raymarching + Post Effects</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { lilGPU } from '../lilGPU.js';

// ─── Scene: same raymarching as raymarching.html ───

const sceneWGSL = /* wgsl */`
struct Params {
  resolution: vec2f,
  time: f32,
};
@group(0) @binding(0) var<uniform> u: Params;

fn sdSphere(p: vec3f, r: f32) -> f32 { return length(p) - r; }
fn sdTorus(p: vec3f, t: vec2f) -> f32 {
  let q = vec2f(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

fn opSmoothUnion(d1: f32, d2: f32, k: f32) -> f32 {
  let h = clamp(0.5 + 0.5 * (d2 - d1) / k, 0.0, 1.0);
  return mix(d2, d1, h) - k * h * (1.0 - h);
}

fn rot2(a: f32) -> mat2x2f {
  let c = cos(a); let s = sin(a);
  return mat2x2f(c, s, -s, c);
}

fn map(pos: vec3f) -> f32 {
  let t = u.time;
  var p = pos;
  let tp = vec3f(p.x, vec2f(p.y, p.z) * rot2(t * 0.4));
  let torus = sdTorus(tp, vec2f(1.0, 0.3));
  let s1 = sdSphere(p - vec3f(cos(t * 0.7) * 1.5, sin(t * 0.5) * 0.5, sin(t * 0.7) * 1.5), 0.4);
  let s2 = sdSphere(p - vec3f(sin(t * 0.6) * 1.2, cos(t * 0.8) * 0.8, cos(t * 0.6) * 1.2), 0.35);
  var d = opSmoothUnion(torus, s1, 0.5);
  d = opSmoothUnion(d, s2, 0.5);
  return min(d, p.y + 1.2);
}

fn calcNormal(p: vec3f) -> vec3f {
  let e = vec2f(0.001, 0.0);
  return normalize(vec3f(
    map(p + e.xyy) - map(p - e.xyy),
    map(p + e.yxy) - map(p - e.yxy),
    map(p + e.yyx) - map(p - e.yyx),
  ));
}

fn softShadow(ro: vec3f, rd: vec3f, mint: f32, maxt: f32, k: f32) -> f32 {
  var res = 1.0; var t = mint;
  for (var i = 0; i < 32; i++) {
    let h = map(ro + rd * t);
    res = min(res, k * h / t);
    t += clamp(h, 0.02, 0.2);
    if (h < 0.001 || t > maxt) { break; }
  }
  return clamp(res, 0.0, 1.0);
}

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  let p = (uv * 2.0 - 1.0) * vec2f(u.resolution.x / u.resolution.y, -1.0);
  let ro = vec3f(0.0, 0.5, 3.5);
  let rd = normalize(vec3f(p, -1.5));
  var t = 0.0;
  for (var i = 0; i < 80; i++) {
    let d = map(ro + rd * t);
    if (d < 0.001 || t > 20.0) { break; }
    t += d;
  }
  var col = vec3f(0.02, 0.04, 0.08);
  if (t < 20.0) {
    let pos = ro + rd * t;
    let nor = calcNormal(pos);
    let ld = normalize(vec3f(0.8, 0.8, -0.5));
    let diff = max(dot(nor, ld), 0.0);
    let spec = pow(max(dot(reflect(-ld, nor), -rd), 0.0), 32.0);
    let sh = softShadow(pos + nor * 0.01, ld, 0.01, 10.0, 16.0);
    col = vec3f(0.08, 0.10, 0.14) * (0.5 + 0.5 * nor.y)
        + vec3f(0.9, 0.75, 0.6) * diff * sh
        + vec3f(1.0) * spec * sh;
  }
  return vec4f(col, 1.0); // linear, no gamma — post effects handle it
}`;

// ─── Post Effect 1: Bloom (threshold + 9-tap blur) ───

const bloomThresholdWGSL = /* wgsl */`
struct Params { threshold: f32 };
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var tex: texture_2d<f32>;
@group(0) @binding(2) var<uniform> u: Params;

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  let col = textureSample(tex, samp, uv).rgb;
  let brightness = dot(col, vec3f(0.2126, 0.7152, 0.0722));
  let bright = col * smoothstep(u.threshold, u.threshold + 0.5, brightness);
  return vec4f(bright, 1.0);
}`;

const bloomBlurWGSL = /* wgsl */`
struct Params {
  texelSize: vec2f,
  direction: vec2f,
};
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var tex: texture_2d<f32>;
@group(0) @binding(2) var<uniform> u: Params;

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  let offsets = array<f32, 5>(0.0, 1.0, 2.0, 3.0, 4.0);
  let weights = array<f32, 5>(0.2270270, 0.1945946, 0.1216216, 0.0540541, 0.0162162);
  let step = u.texelSize * u.direction;

  var col = textureSample(tex, samp, uv).rgb * weights[0];
  for (var i = 1; i < 5; i++) {
    let offset = step * offsets[i];
    col += textureSample(tex, samp, uv + offset).rgb * weights[i];
    col += textureSample(tex, samp, uv - offset).rgb * weights[i];
  }
  return vec4f(col, 1.0);
}`;

// ─── Post Effect 2: Vignette + Chromatic Aberration + Gamma ───

const compositeWGSL = /* wgsl */`
struct Params {
  resolution: vec2f,
  bloomStrength: f32,
  vignetteAmount: f32,
  chromaticAmount: f32,
};
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var sceneTex: texture_2d<f32>;
@group(0) @binding(2) var bloomTex: texture_2d<f32>;
@group(0) @binding(3) var<uniform> u: Params;

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  // Chromatic aberration
  let center = uv - 0.5;
  let dist = length(center);
  let offset = center * dist * u.chromaticAmount;
  var col: vec3f;
  col.r = textureSample(sceneTex, samp, uv + offset).r;
  col.g = textureSample(sceneTex, samp, uv).g;
  col.b = textureSample(sceneTex, samp, uv - offset).b;

  // Add bloom
  let bloom = textureSample(bloomTex, samp, uv).rgb;
  col += bloom * u.bloomStrength;

  // Vignette
  let vig = 1.0 - smoothstep(0.4, 0.9, dist * u.vignetteAmount);
  col *= vig;

  // Gamma
  col = pow(col, vec3f(0.4545));

  return vec4f(col, 1.0);
}`;

// ─── Setup ───

const canvas = document.querySelector('canvas');
const gpu = await lilGPU(canvas);
gpu.fitWindow((w, h) => {
  sceneFBO.resize(w, h);
  brightFBO.resize(w >> 1, h >> 1);
  blurPing.resize(w >> 1, h >> 1);
  blurPong.resize(w >> 1, h >> 1);
});

const FMT = 'rgba16float';

// FBOs
let sceneFBO = gpu.framebuffer(canvas.width, canvas.height, { format: FMT });
let brightFBO = gpu.framebuffer(canvas.width >> 1, canvas.height >> 1, { format: FMT });
let blurPing = gpu.framebuffer(canvas.width >> 1, canvas.height >> 1, { format: FMT });
let blurPong = gpu.framebuffer(canvas.width >> 1, canvas.height >> 1, { format: FMT });

// Pipelines
const scenePipe = gpu.pipeline({ vertex: gpu.FULLSCREEN_VERT, fragment: sceneWGSL, format: FMT });
const threshPipe = gpu.pipeline({ vertex: gpu.FULLSCREEN_VERT, fragment: bloomThresholdWGSL, format: FMT });
const blurPipe = gpu.pipeline({ vertex: gpu.FULLSCREEN_VERT, fragment: bloomBlurWGSL, format: FMT });
const compositePipe = gpu.pipeline({ vertex: gpu.FULLSCREEN_VERT, fragment: compositeWGSL });

// UBOs
const sceneUBO = gpu.buffer(new Float32Array(4), { uniform: true });
const threshUBO = gpu.buffer(new Float32Array(4), { uniform: true });
const blurUBO = gpu.buffer(new Float32Array(4), { uniform: true });
const compositeUBO = gpu.buffer(new Float32Array(8), { uniform: true });

// Static bind groups (no resizable textures)
const sceneBG = gpu.device.createBindGroup({
  layout: scenePipe.getBindGroupLayout(0),
  entries: [{ binding: 0, resource: { buffer: sceneUBO.buffer } }],
});

const threshBG_layout = threshPipe.getBindGroupLayout(0);
const blurBG_layout = blurPipe.getBindGroupLayout(0);
const compositeBG_layout = compositePipe.getBindGroupLayout(0);

// Params
threshUBO.write(new Float32Array([0.6, 0, 0, 0]));
compositeUBO.write(new Float32Array([
  canvas.width, canvas.height, // resolution
  0.5,   // bloomStrength
  1.4,   // vignetteAmount
  0.008, // chromaticAmount
  0, 0, 0,
]));

// ─── Render loop ───

(function render() {
  const t = performance.now() * 0.001;
  const w = canvas.width, h = canvas.height;
  const bw = w >> 1, bh = h >> 1;

  sceneUBO.write(new Float32Array([w, h, t, 0]));
  compositeUBO.write(new Float32Array([w, h, 0.5, 1.4, 0.008, 0, 0, 0]));

  gpu.frame((gpu) => {
    // 1. Render scene to FBO (linear HDR)
    gpu.pass({ target: sceneFBO }, (p) => {
      p.setPipeline(scenePipe);
      p.setBindGroup(0, sceneBG);
      p.draw(3);
    });

    // 2. Post Effect 1: Bloom
    //    2a. Threshold — extract bright areas
    gpu.pass({ target: brightFBO }, (p) => {
      p.setPipeline(threshPipe);
      p.setBindGroup(0, gpu.device.createBindGroup({
        layout: threshBG_layout,
        entries: [
          { binding: 0, resource: gpu.sampler },
          { binding: 1, resource: sceneFBO.view },
          { binding: 2, resource: { buffer: threshUBO.buffer } },
        ],
      }));
      p.draw(3);
    });

    //    2b. Two-pass Gaussian blur (horizontal then vertical)
    const texelSize = [1.0 / bw, 1.0 / bh];

    // Horizontal blur
    blurUBO.write(new Float32Array([...texelSize, 1, 0]));
    gpu.pass({ target: blurPing }, (p) => {
      p.setPipeline(blurPipe);
      p.setBindGroup(0, gpu.device.createBindGroup({
        layout: blurBG_layout,
        entries: [
          { binding: 0, resource: gpu.sampler },
          { binding: 1, resource: brightFBO.view },
          { binding: 2, resource: { buffer: blurUBO.buffer } },
        ],
      }));
      p.draw(3);
    });

    // Vertical blur
    blurUBO.write(new Float32Array([...texelSize, 0, 1]));
    gpu.pass({ target: blurPong }, (p) => {
      p.setPipeline(blurPipe);
      p.setBindGroup(0, gpu.device.createBindGroup({
        layout: blurBG_layout,
        entries: [
          { binding: 0, resource: gpu.sampler },
          { binding: 1, resource: blurPing.view },
          { binding: 2, resource: { buffer: blurUBO.buffer } },
        ],
      }));
      p.draw(3);
    });

    // 3. Post Effect 2: Composite (chromatic aberration + bloom add + vignette + gamma)
    gpu.pass((p) => {
      p.setPipeline(compositePipe);
      p.setBindGroup(0, gpu.device.createBindGroup({
        layout: compositeBG_layout,
        entries: [
          { binding: 0, resource: gpu.sampler },
          { binding: 1, resource: sceneFBO.view },
          { binding: 2, resource: blurPong.view },
          { binding: 3, resource: { buffer: compositeUBO.buffer } },
        ],
      }));
      p.draw(3);
    });
  });

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
