<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lilGPU — Raymarching</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { lilGPU } from '../lilGPU.js';

const fragmentWGSL = /* wgsl */`
struct Params {
  resolution: vec2f,
  time: f32,
};
@group(0) @binding(0) var<uniform> u: Params;

fn sdSphere(p: vec3f, r: f32) -> f32 { return length(p) - r; }
fn sdTorus(p: vec3f, t: vec2f) -> f32 {
  let q = vec2f(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}
fn sdBox(p: vec3f, b: vec3f) -> f32 {
  let q = abs(p) - b;
  return length(max(q, vec3f(0.0))) + min(max(q.x, max(q.y, q.z)), 0.0);
}

fn opSmoothUnion(d1: f32, d2: f32, k: f32) -> f32 {
  let h = clamp(0.5 + 0.5 * (d2 - d1) / k, 0.0, 1.0);
  return mix(d2, d1, h) - k * h * (1.0 - h);
}

fn rot2(a: f32) -> mat2x2f {
  let c = cos(a); let s = sin(a);
  return mat2x2f(c, s, -s, c);
}

fn map(pos: vec3f) -> f32 {
  let t = u.time;

  var p = pos;
  // Rotating torus
  let torus_p = vec3f(p.x, vec2f(p.y, p.z) * rot2(t * 0.4));
  let torus = sdTorus(torus_p, vec2f(1.0, 0.3));

  // Orbiting spheres
  let s1_p = p - vec3f(cos(t * 0.7) * 1.5, sin(t * 0.5) * 0.5, sin(t * 0.7) * 1.5);
  let sphere1 = sdSphere(s1_p, 0.4);

  let s2_p = p - vec3f(sin(t * 0.6) * 1.2, cos(t * 0.8) * 0.8, cos(t * 0.6) * 1.2);
  let sphere2 = sdSphere(s2_p, 0.35);

  // Floor
  let floor = p.y + 1.2;

  var d = opSmoothUnion(torus, sphere1, 0.5);
  d = opSmoothUnion(d, sphere2, 0.5);
  d = min(d, floor);
  return d;
}

fn calcNormal(p: vec3f) -> vec3f {
  let e = vec2f(0.001, 0.0);
  return normalize(vec3f(
    map(p + e.xyy) - map(p - e.xyy),
    map(p + e.yxy) - map(p - e.yxy),
    map(p + e.yyx) - map(p - e.yyx),
  ));
}

fn softShadow(ro: vec3f, rd: vec3f, mint: f32, maxt: f32, k: f32) -> f32 {
  var res = 1.0;
  var t = mint;
  for (var i = 0; i < 32; i++) {
    let h = map(ro + rd * t);
    res = min(res, k * h / t);
    t += clamp(h, 0.02, 0.2);
    if (h < 0.001 || t > maxt) { break; }
  }
  return clamp(res, 0.0, 1.0);
}

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  let p = (uv * 2.0 - 1.0) * vec2f(u.resolution.x / u.resolution.y, -1.0);

  let ro = vec3f(0.0, 0.5, 3.5);
  let rd = normalize(vec3f(p, -1.5));

  // Raymarch
  var t = 0.0;
  for (var i = 0; i < 80; i++) {
    let d = map(ro + rd * t);
    if (d < 0.001 || t > 20.0) { break; }
    t += d;
  }

  var col = vec3f(0.02, 0.04, 0.08); // bg

  if (t < 20.0) {
    let pos = ro + rd * t;
    let nor = calcNormal(pos);

    let lightDir = normalize(vec3f(0.8, 0.8, -0.5));
    let diff = max(dot(nor, lightDir), 0.0);
    let spec = pow(max(dot(reflect(-lightDir, nor), -rd), 0.0), 32.0);
    let shadow = softShadow(pos + nor * 0.01, lightDir, 0.01, 10.0, 16.0);
    let ao = 0.5 + 0.5 * nor.y;

    let ambient = vec3f(0.08, 0.10, 0.14) * ao;
    let diffCol = vec3f(0.9, 0.75, 0.6) * diff * shadow;
    let specCol = vec3f(1.0, 0.95, 0.9) * spec * shadow;

    col = ambient + diffCol + specCol;
    col = pow(col, vec3f(0.4545)); // gamma
  }

  return vec4f(col, 1.0);
}`;

const canvas = document.querySelector('canvas');
const gpu = await lilGPU(canvas);
gpu.fitWindow();

const pipe = gpu.pipeline({
  vertex: gpu.FULLSCREEN_VERT,
  fragment: fragmentWGSL,
});

const ubo = gpu.buffer(new Float32Array(4), { uniform: true });

const bg = gpu.device.createBindGroup({
  layout: pipe.getBindGroupLayout(0),
  entries: [{ binding: 0, resource: { buffer: ubo.buffer } }],
});

(function render() {
  ubo.write(new Float32Array([canvas.width, canvas.height, performance.now() * 0.001, 0]));
  gpu.pass((p) => {
    p.setPipeline(pipe);
    p.setBindGroup(0, bg);
    p.draw(3);
  });
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
