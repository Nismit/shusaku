<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lilGPU — Basic Example</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { lilGPU } from '../lilGPU.js';

const fragmentWGSL = /* wgsl */`
struct Params {
  resolution: vec2f,
  time: f32,
};
@group(0) @binding(0) var<uniform> u: Params;

@fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
  let p = (uv * 2.0 - 1.0) * vec2f(u.resolution.x / u.resolution.y, -1.0);
  let d = length(p);
  let ring = smoothstep(0.02, 0.0, abs(d - 0.4 - 0.1 * sin(u.time * 2.0)));
  let glow = 0.02 / (d + 0.01);
  let col = vec3f(0.3, 0.6, 1.0) * ring + vec3f(1.0, 0.4, 0.2) * glow;
  return vec4f(col, 1.0);
}`;

const canvas = document.querySelector('canvas');
const gpu = await lilGPU(canvas);
gpu.fitWindow();

const pipe = gpu.pipeline({
  vertex: gpu.FULLSCREEN_VERT,
  fragment: fragmentWGSL,
});

// Struct layout: resolution(vec2f) at offset 0, time(f32) at offset 8, pad at offset 12
const ubo = gpu.buffer(new Float32Array(4), { uniform: true });

const bg = gpu.device.createBindGroup({
  layout: pipe.getBindGroupLayout(0),
  entries: [{ binding: 0, resource: { buffer: ubo.buffer } }],
});

(function render() {
  const t = performance.now() * 0.001;
  ubo.write(new Float32Array([canvas.width, canvas.height, t, 0]));

  gpu.pass((p) => {
    p.setPipeline(pipe);
    p.setBindGroup(0, bg);
    p.draw(3);
  });

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
