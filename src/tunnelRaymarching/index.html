<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunnel Raymarching</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    .lil-gui.root { right: 0 !important; }
    canvas { display: block; }
    #controls-toggle {
      display: none;
    }
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.6);
      font-family: monospace;
      font-size: 13px;
      color: #eee;
      z-index: 10;
    }
    #controls-close {
      display: none;
    }
    @media (max-width: 767px) {
      #controls-toggle {
        position: fixed;
        bottom: 12px;
        left: 12px;
        z-index: 20;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255,255,255,0.3);
        background: rgba(0,0,0,0.6);
        color: #eee;
        font-size: 18px;
        cursor: pointer;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #controls-toggle.hidden {
        display: none;
      }
      #controls {
        flex-wrap: wrap;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.8);
        transform: translateY(100%);
        transition: transform 0.25s ease;
      }
      #controls.open {
        transform: translateY(0);
      }
      #controls #controls-close {
        display: block;
        flex-basis: 100%;
        text-align: right;
        background: none;
        border: none;
        color: #eee;
        font-size: 20px;
        cursor: pointer;
        padding: 0 0 4px;
        line-height: 1;
        border-radius: 0;
      }
      #controls #controls-close:hover {
        background: none;
      }
      #time-display {
        min-width: 110px;
      }
    }
    #controls button, #controls select {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #eee;
      padding: 3px 10px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    #controls button:hover, #controls select:hover { background: rgba(255, 255, 255, 0.25); }
    #controls input {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #eee;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 12px;
      border-radius: 3px;
      width: 60px;
    }
    .separator { color: rgba(255,255,255,0.3); }
    #custom-size { display: none; }
  </style>
</head>
<body>
  <button id="controls-toggle" aria-label="Toggle controls">&#9776;</button>
  <div id="controls">
    <button id="controls-close" aria-label="Close controls">&#10005;</button>
    <button id="play-pause">Pause</button>
    <button id="reset">Reset</button>
    <span id="time-display">0.00s | f:0</span>
    <span class="separator">|</span>
    <select id="size-preset">
      <option value="1080p">1080p</option>
      <option value="4K">4K</option>
      <option value="Square 1080">Square 1080</option>
      <option value="Instagram">Instagram</option>
      <option value="Custom">Custom</option>
    </select>
    <span id="custom-size">
      <input id="custom-width" type="number" value="1920" placeholder="W">x<input id="custom-height" type="number" value="1080" placeholder="H">
    </span>
    <button id="snapshot">Snapshot</button>
  </div>
  <script type="module">
    import { main } from './main.js';
    main();
    const toggle = document.getElementById('controls-toggle');
    const controls = document.getElementById('controls');
    toggle.addEventListener('click', () => {
      controls.classList.add('open');
      toggle.classList.add('hidden');
    });
    document.getElementById('controls-close').addEventListener('click', () => {
      controls.classList.remove('open');
      toggle.classList.remove('hidden');
    });
  </script>
</body>
</html>
